spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/msuser
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  rabbitmq:
    host: rabbitmq
    port: 5672
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
