# ══════════════════════════════════════════════
# Configuration spécifique USER SERVICE
# ══════════════════════════════════════════════

server:
  port: 8081

spring:
  application:
    name: user-service
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

# Configuration spécifique au service
user-service:
  features:
    email-verification: true
    password-reset: true
  security:
    jwt:
      expiration: 86400000 # 24 heures en millisecondes

# Logging spécifique
logging:
  level:
    fello.miage: DEBUG
